name: maplebirch

on:
  push:
    tags:
      - 'maplebirch-release-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and Package
        run: bun run build:all

      - name: Checkout dol-0.5.7.9 branch
        uses: actions/checkout@v4
        with:
          ref: dol-0.5.7.9
          path: dol-0.5.7.9
          fetch-depth: 0

      - name: Install dependencies for dol-0.5.7.9
        working-directory: dol-0.5.7.9
        run: bun install

      - name: Build and Package for dol-0.5.7.9
        working-directory: dol-0.5.7.9
        run: bun run build:all

      - name: Parse Version from Tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/maplebirch-release-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=maplebirch-release-v$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Version Consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version mismatch (package.json: $PKG_VERSION, tag: $TAG_VERSION)"
            exit 1
          fi

      - name: Find Previous Tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.get_version.outputs.TAG_NAME }}"
          PREV_TAG=$(git tag --list 'maplebirch-release-v*' --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1 || true)
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Build Compare Link
        id: compare_link
        run: |
          CURRENT_TAG="${{ steps.get_version.outputs.TAG_NAME }}"
          PREV_TAG="${{ steps.prev_tag.outputs.PREV_TAG }}"

          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/tags/$PREV_TAG...tags/$CURRENT_TAG"
            echo "compare_md=- [查看版本差异]($COMPARE_URL)" >> $GITHUB_OUTPUT
          fi

      - name: Extract Changelog
        id: extract_changelog
        run: |
          CURRENT_VERSION="${{ steps.get_version.outputs.VERSION }}"
          CHANGELOG_FILE="UPDATE.md"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "changelog_body=UPDATE.md file not found." >> $GITHUB_OUTPUT
            exit 0
          fi

          LOG_CONTENT=$(awk -v ver="$CURRENT_VERSION" '
            { gsub(/\r$/, "") }
            $0 ~ "^##### \\(v\\." ver "更新日志\\):" { found=1; next }
            found && /^##### \(v\.[0-9]+\.[0-9]+\.[0-9]+更新日志\):/ { exit }
            found { print }
          ' "$CHANGELOG_FILE")

          if [ -z "$LOG_CONTENT" ]; then
            echo "changelog_body=No changelog found for v.$CURRENT_VERSION." >> $GITHUB_OUTPUT
          else
            echo "changelog_body<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'SCML-maplebirchFrameworks-version-${{ steps.get_version.outputs.VERSION }}'
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            #### v.${{ steps.get_version.outputs.VERSION }} 更新日志
            ${{ steps.extract_changelog.outputs.changelog_body }}

            #### 相关链接
            ${{ steps.compare_link.outputs.compare_md }}
            - [完整更新日志](https://github.com/${{ github.repository }}/blob/main/UPDATE.md) - 查看所有版本历史记录
            - [秋枫白桦扩展](https://github.com/MaplebirchLeaf/SCML-DOL-maplebirchExpansion) - 包含侧边栏控件、作弊集、内置音乐盒等功能。
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            package/*.zip
            dol-0.5.7.9/package/*.zip
