name: maplebirch

on:
  push:
    tags:
      - 'maplebirch-release-v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.VERSION }}
      tag_name: ${{ steps.release.outputs.TAG_NAME }}
      build_matrix: ${{ steps.matrix.outputs.BUILD_MATRIX }}
    steps:
      - name: Resolve release refs
        id: release
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$TAG_NAME" != maplebirch-release-v* ]]; then
            echo "Error: release tag must match maplebirch-release-v* (got: $TAG_NAME)"
            exit 1
          fi

          VERSION="${TAG_NAME#maplebirch-release-v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          RELEASE_TAG: ${{ steps.release.outputs.TAG_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const releaseTag = process.env.RELEASE_TAG;
          const repo = process.env.GITHUB_REPOSITORY;
          const api = process.env.GITHUB_API_URL;
          const token = process.env.GITHUB_TOKEN;

          async function dolBranches() {
            const branches = [];
            let page = 1;

            while (true) {
              const url = `${api}/repos/${repo}/branches?per_page=100&page=${page}`;
              const res = await fetch(url, {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: 'application/vnd.github+json',
                },
              });

              if (!res.ok) {
                throw new Error(`Failed to fetch branches: ${res.status} ${res.statusText}`);
              }

              const data = await res.json();
              if (!Array.isArray(data) || data.length === 0) break;

              for (const branch of data) {
                if (/^dol-v\d+\.\d+\.\d+(?:\.\d+)?$/.test(branch.name)) {
                  branches.push(branch.name);
                }
              }

              page++;
            }

            return branches.sort((a, b) =>
              b.localeCompare(a, undefined, { numeric: true, sensitivity: 'base' })
            );
          }

          dolBranches().then(branches => {
            const refs = [
              releaseTag,
              ...branches.filter(ref => ref !== releaseTag),
            ];

            const include = refs.map(ref => ({
              ref,
              label: ref
                .replace(/^refs\/(?:heads|tags)\//, '')
                .replace(/[^A-Za-z0-9._-]+/g, '-'),
            }));

            console.log(`BUILD_MATRIX=${JSON.stringify({ include })}`);
          }).catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Checkout ${{ matrix.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify Version Consistency
        if: matrix.ref == needs.prepare.outputs.tag_name
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ needs.prepare.outputs.version }}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version mismatch on ${{ matrix.ref }} (package.json: $PKG_VERSION, tag: $TAG_VERSION)"
            exit 1
          fi

      - name: Build and Package
        run: bun run build:all

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.label }}
          path: package/*.zip
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Find Previous Tag
        id: prev_tag
        run: |
          git fetch --tags --force

          CURRENT_TAG="${{ needs.prepare.outputs.tag_name }}"
          PREV_TAG=$(git tag --list 'maplebirch-release-v*' --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1 || true)

          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Compare Link
        id: compare_link
        run: |
          CURRENT_TAG="${{ needs.prepare.outputs.tag_name }}"
          PREV_TAG="${{ steps.prev_tag.outputs.PREV_TAG }}"

          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/tags/$PREV_TAG...tags/$CURRENT_TAG"
            echo "compare_md=- [查看版本差异]($COMPARE_URL)" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Changelog
        id: extract_changelog
        run: |
          CURRENT_VERSION="${{ needs.prepare.outputs.version }}"
          CURRENT_MINOR="${CURRENT_VERSION%.*}"
          CHANGELOG_FILE="UPDATE.md"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "changelog_body=UPDATE.md file not found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOG_CONTENT=$(awk -v minor="$CURRENT_MINOR" '
            { gsub(/\r$/, "") }

            /^##### \(v\.[0-9]+\.[0-9]+\.(x|[0-9]+)更新日志\):/ {
              if ($0 ~ "^##### \\(v\\." minor "\\.(x|[0-9]+)更新日志\\):") {
                found=1
                print
                next
              }

              if (found) {
                found=0
              }
            }

            found { print }
          ' "$CHANGELOG_FILE")

          if [ -z "$LOG_CONTENT" ]; then
            echo "changelog_body=No changelog found for v.$CURRENT_MINOR.x." >> "$GITHUB_OUTPUT"
          else
            echo "changelog_body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$LOG_CONTENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'SCML-maplebirchFrameworks-version-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          body: |
            #### v.${{ needs.prepare.outputs.version }} 更新日志
            ${{ steps.extract_changelog.outputs.changelog_body }}

            #### 相关链接
            ${{ steps.compare_link.outputs.compare_md }}
            - [枯木逢春](https://github.com/MaplebirchLeaf/Deadwood-Reblooms) - 依赖于框架制作的功能模组
            - [模组保护工具](https://github.com/MaplebirchLeaf/dol-mod-protection-tools) - 为模组提供凭证加密功能
            - [完整更新日志](https://github.com/${{ github.repository }}/blob/main/UPDATE.md) - 查看所有版本历史记录
          draft: false
          prerelease: false
          generate_release_notes: false
          files: release-assets/**/*.zip
